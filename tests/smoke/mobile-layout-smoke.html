<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mobile layout smoke</title>
    <link rel="stylesheet" href="../../styles/common.css">
    <link rel="stylesheet" href="../../styles/setup.css">
    <link rel="stylesheet" href="../../styles/game.css">
  </head>
  <body>
    <pre id="result">running</pre>
    <main class="shell">
      <section id="setupScreen" class="setup-screen" aria-labelledby="setupTitle">
        <div class="setup-copy">
          <p class="eyebrow">Smoke</p>
          <h1 id="setupTitle">Snake</h1>
          <p class="lede">Mobile layout smoke.</p>
        </div>
        <form id="setupForm" class="setup-form">
          <fieldset class="mode-picker">
            <legend>Players</legend>
            <label><input type="radio" name="mode" value="1"><span>One</span></label>
            <label><input type="radio" name="mode" value="2" checked><span>Two</span></label>
          </fieldset>
          <div class="player-grid">
            <section class="player-panel">
              <div class="player-heading">
                <span class="player-mark" data-player="0"></span>
                <h2>Player 1</h2>
                <div class="key-row" data-controls-player="0"></div>
              </div>
              <label class="field"><span>Name</span><input id="playerOneName" name="playerOneName" value="Lime"></label>
              <fieldset class="field color-field" data-color-picker="0">
                <legend>Color</legend>
                <div class="color-options" data-color-options></div>
              </fieldset>
            </section>
            <section class="player-panel" id="playerTwoPanel">
              <div class="player-heading">
                <span class="player-mark" data-player="1"></span>
                <h2>Player 2</h2>
                <div class="key-row" data-controls-player="1"></div>
              </div>
              <label class="field"><span>Name</span><input id="playerTwoName" name="playerTwoName" value="Berry"></label>
              <fieldset class="field color-field" data-color-picker="1">
                <legend>Color</legend>
                <div class="color-options" data-color-options></div>
              </fieldset>
            </section>
          </div>
          <div class="settings-grid">
            <fieldset class="setting-picker setting-picker--two">
              <legend>Challenge</legend>
              <label><input type="radio" name="challenge" value="classic" checked><span>Classic</span></label>
              <label><input type="radio" name="challenge" value="reading"><span>Reading</span></label>
            </fieldset>
            <fieldset class="setting-picker setting-picker--three">
              <legend>Speed</legend>
              <label><input type="radio" name="speed" value="manual" checked><span>No auto</span></label>
              <label><input type="radio" name="speed" value="slow"><span>Slow</span></label>
              <label><input type="radio" name="speed" value="fast"><span>Fast</span></label>
            </fieldset>
            <fieldset class="setting-picker setting-picker--four">
              <legend>Field size</legend>
              <label><input type="radio" name="fieldSize" value="auto" checked><span>Auto</span></label>
              <label><input type="radio" name="fieldSize" value="small"><span>Small</span></label>
              <label><input type="radio" name="fieldSize" value="medium"><span>Medium</span></label>
              <label><input type="radio" name="fieldSize" value="large"><span>Large</span></label>
            </fieldset>
            <label class="field setting-field" id="dictionaryField">
              <span>Dictionary</span>
              <select id="dictionarySelect" name="dictionaryId"></select>
            </label>
            <fieldset class="setting-picker setting-picker--two setting-picker--wide">
              <legend>Theme</legend>
              <label><input type="radio" name="theme" value="dark" checked><span>Dark</span></label>
              <label><input type="radio" name="theme" value="light"><span>Light</span></label>
            </fieldset>
          </div>
          <button class="primary-button" type="submit">Start game</button>
        </form>
      </section>
      <section id="gameScreen" class="game-screen is-hidden">
        <header class="game-header">
          <div id="readingPrompt" class="reading-prompt is-hidden"><strong id="targetWord">APPLE</strong></div>
          <div class="scoreboard" id="scoreboard"></div>
          <div class="toolbar">
            <button id="pauseButton" class="icon-button" type="button"><span>||</span></button>
            <button id="restartButton" class="icon-button" type="button"><span>&#8635;</span></button>
            <button id="setupButton" class="icon-button" type="button"><span>&#9881;</span></button>
          </div>
        </header>
        <div class="arena-wrap">
          <canvas id="gameCanvas" width="960" height="672"></canvas>
          <div id="overlay" class="overlay is-hidden">
            <p id="overlayKicker" class="eyebrow">Paused</p>
            <h2 id="overlayTitle">Game paused</h2>
            <p id="overlayText">Press resume when you are ready.</p>
            <button id="overlayButton" class="primary-button" type="button">Resume</button>
          </div>
        </div>
        <div id="mobileControls" class="mobile-controls is-hidden">
          <button class="mobile-control" type="button" data-dir="up">&#8593;</button>
          <button class="mobile-control" type="button" data-dir="left">&#8592;</button>
          <button class="mobile-control" type="button" data-dir="down">&#8595;</button>
          <button class="mobile-control" type="button" data-dir="right">&#8594;</button>
        </div>
      </section>
    </main>

    <script src="../../src/config.js"></script>
    <script src="../../dictionaries/english.js"></script>
    <script src="../../dictionaries/french.js"></script>
    <script src="../../dictionaries/german.js"></script>
    <script src="../../dictionaries/greek.js"></script>
    <script src="../../dictionaries/italian.js"></script>
    <script src="../../dictionaries/russian.js"></script>
    <script src="../../dictionaries/ukrainian.js"></script>
    <script src="../../dictionaries/uzbek.js"></script>
    <script src="../../src/core/dictionary.js"></script>
    <script src="../../src/core/storage.js"></script>
    <script src="../../src/core/url-state.js"></script>
    <script src="../../src/core/engine.js"></script>
    <script src="../../src/presentation/renderer.js"></script>
    <script src="../../src/presentation/ui.js"></script>
    <script src="../../src/presentation/sound.js"></script>
    <script src="../../src/app.js"></script>
    <script>
      (function () {
        "use strict";

        setTimeout(() => {
          report("checking setup");
          assert(document.querySelectorAll(".color-swatch").length === 12, "Expected generated color swatches.");
          document.querySelector("#setupScreen").style.paddingBottom = "720px";
          window.scrollTo(0, document.body.scrollHeight);
          document.querySelector("#setupForm").requestSubmit();

          setTimeout(() => {
            report("checking game");
            assert(document.documentElement.classList.contains("is-phone-mode"), "Expected phone mode.");
            assert(!document.querySelector("#gameScreen").classList.contains("is-hidden"), "Expected game screen.");
            assert(window.scrollY < 2, "Expected game start to reset page scroll.");
            assert(document.querySelector("#playerTwoPanel").classList.contains("is-phone-hidden"), "Expected Player 2 hidden.");
            assert(!document.querySelector("#mobileControls").classList.contains("is-hidden"), "Expected D-pad visible.");
            assert(document.querySelectorAll(".score-card").length === 1, "Expected one score card.");
            const canvas = document.querySelector("#gameCanvas");
            assert(canvas.width > 0, "Expected sized canvas.");
            assert(hasCanvasInk(canvas), "Expected board to be drawn before first touch.");

            const beforeMove = canvas.toDataURL();
            document.querySelector('[data-dir="down"]').click();

            setTimeout(() => {
              report("checking controls");
              assert(canvas.toDataURL() !== beforeMove, "Expected D-pad to move manual snake.");
              waitForHistoryReturn(() => {
                report("checking back");
                assert(!document.querySelector("#setupScreen").classList.contains("is-hidden"), "Expected browser back to show setup.");
                assert(document.querySelector("#gameScreen").classList.contains("is-hidden"), "Expected browser back to hide game.");
                document.querySelector("#result").textContent = "mobile layout smoke ok";
              });
              window.history.back();
            }, 100);
          }, 100);
        }, 100);

        function assert(condition, message) {
          if (!condition) {
            throw new Error(message);
          }
        }

        function report(message) {
          document.querySelector("#result").textContent = message;
        }

        function hasCanvasInk(canvas) {
          const data = canvas.getContext("2d").getImageData(0, 0, canvas.width, canvas.height).data;

          for (let index = 0; index < data.length; index += 64) {
            if (data[index + 3] > 0 && (data[index] > 30 || data[index + 1] > 30 || data[index + 2] > 30)) {
              return true;
            }
          }

          return false;
        }

        function waitForHistoryReturn(callback) {
          let done = false;
          const setupScreen = document.querySelector("#setupScreen");
          const gameScreen = document.querySelector("#gameScreen");
          const observer = new MutationObserver(finish);
          const timeout = setTimeout(() => {
            report("waiting for back");
          }, 1000);

          observer.observe(setupScreen, { attributes: true, attributeFilter: ["class"] });
          observer.observe(gameScreen, { attributes: true, attributeFilter: ["class"] });
          window.addEventListener("hashchange", finish);
          window.addEventListener("popstate", finish);
          finish();

          function finish() {
            const isSetupVisible = !setupScreen.classList.contains("is-hidden");
            const isGameHidden = gameScreen.classList.contains("is-hidden");
            if (done || !isSetupVisible || !isGameHidden) {
              return;
            }

            done = true;
            clearTimeout(timeout);
            observer.disconnect();
            window.removeEventListener("hashchange", finish);
            window.removeEventListener("popstate", finish);
            callback();
          }
        }
      })();
    </script>
  </body>
</html>
