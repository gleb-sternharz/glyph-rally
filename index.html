<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Local Snake</title>
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/setup.css">
    <link rel="stylesheet" href="styles/game.css">
  </head>
  <body>
    <div id="bootLoader" class="boot-loader" role="status" aria-live="polite" hidden>
      <div class="boot-loader__panel">
        <p class="eyebrow">Loading</p>
        <div class="boot-loader__title">Snake</div>
        <div
          id="bootProgress"
          class="boot-progress"
          role="progressbar"
          aria-label="Loading progress"
          aria-valuemin="0"
          aria-valuemax="100"
          aria-valuenow="0"
        >
          <span id="bootProgressBar"></span>
        </div>
        <p id="bootProgressText" class="boot-loader__text">Preparing game</p>
      </div>
    </div>

    <main class="shell">
      <section id="setupScreen" class="setup-screen" aria-labelledby="setupTitle">
        <div class="setup-copy">
          <p class="eyebrow">Local arcade</p>
          <h1 id="setupTitle">Snake</h1>
          <p class="lede">Pick your players, colors, and mode. Then settle it on one keyboard.</p>
        </div>

        <form id="setupForm" class="setup-form">
          <fieldset class="mode-picker">
            <legend>Players</legend>
            <label>
              <input type="radio" name="mode" value="1">
              <span>One</span>
            </label>
            <label>
              <input type="radio" name="mode" value="2" checked>
              <span>Two</span>
            </label>
          </fieldset>

          <div class="player-grid">
            <section class="player-panel" aria-labelledby="playerOneTitle">
              <div class="player-heading">
                <span class="player-mark" data-player="0"></span>
                <h2 id="playerOneTitle">Player 1</h2>
                <div class="key-row" data-controls-player="0" aria-label="Player 1 controls"></div>
              </div>

              <label class="field">
                <span>Name</span>
                <input id="playerOneName" name="playerOneName" type="text" maxlength="16" autocomplete="off" value="Lime">
              </label>

              <fieldset class="field color-field" data-color-picker="0">
                <legend>Color</legend>
                <div class="color-options" data-color-options></div>
              </fieldset>

            </section>

            <section class="player-panel" id="playerTwoPanel" aria-labelledby="playerTwoTitle">
              <div class="player-heading">
                <span class="player-mark" data-player="1"></span>
                <h2 id="playerTwoTitle">Player 2</h2>
                <div class="key-row" data-controls-player="1" aria-label="Player 2 controls"></div>
              </div>

              <label class="field">
                <span>Name</span>
                <input id="playerTwoName" name="playerTwoName" type="text" maxlength="16" autocomplete="off" value="Berry">
              </label>

              <fieldset class="field color-field" data-color-picker="1">
                <legend>Color</legend>
                <div class="color-options" data-color-options></div>
              </fieldset>
            </section>
          </div>

          <div class="settings-grid">
            <fieldset class="setting-picker setting-picker--two">
              <legend>Challenge</legend>
              <label>
                <input type="radio" name="challenge" value="classic" checked>
                <span>Classic</span>
              </label>
              <label>
                <input type="radio" name="challenge" value="reading">
                <span>Reading</span>
              </label>
            </fieldset>

            <label class="field setting-field" id="dictionaryField">
              <span>Challenge Language</span>
              <select id="dictionarySelect" name="dictionaryId"></select>
            </label>

            <fieldset class="setting-picker setting-picker--three">
              <legend>Speed</legend>
              <label>
                <input type="radio" name="speed" value="manual">
                <span>No auto</span>
              </label>
              <label>
                <input type="radio" name="speed" value="slow">
                <span>Slow</span>
              </label>
              <label>
                <input type="radio" name="speed" value="fast" checked>
                <span>Fast</span>
              </label>
            </fieldset>

            <fieldset class="setting-picker setting-picker--four">
              <legend>Field size</legend>
              <label>
                <input type="radio" name="fieldSize" value="auto" checked>
                <span>Auto</span>
              </label>
              <label>
                <input type="radio" name="fieldSize" value="small">
                <span>Small</span>
              </label>
              <label>
                <input type="radio" name="fieldSize" value="medium">
                <span>Medium</span>
              </label>
              <label>
                <input type="radio" name="fieldSize" value="large">
                <span>Large</span>
              </label>
            </fieldset>

            <fieldset class="setting-picker setting-picker--two setting-picker--wide">
              <legend>Theme</legend>
              <label>
                <input type="radio" name="theme" value="dark" checked>
                <span>Dark</span>
              </label>
              <label>
                <input type="radio" name="theme" value="light">
                <span>Light</span>
              </label>
            </fieldset>
          </div>

          <button class="primary-button" type="submit">Start game</button>
        </form>
      </section>

      <section id="gameScreen" class="game-screen is-hidden" aria-labelledby="gameTitle">
        <header class="game-header">
          <div id="readingPrompt" class="reading-prompt is-hidden" aria-live="polite">
            <strong id="targetWord">APPLE</strong>
          </div>
          <div class="scoreboard" id="scoreboard" aria-live="polite"></div>
          <div class="toolbar" aria-label="Game controls">
            <button id="pauseButton" class="icon-button" type="button" aria-label="Pause">
              <span aria-hidden="true">||</span>
            </button>
            <button id="restartButton" class="icon-button" type="button" aria-label="Restart">
              <span aria-hidden="true">&#8635;</span>
            </button>
            <button id="setupButton" class="icon-button" type="button" aria-label="Setup">
              <span aria-hidden="true">&#9881;</span>
            </button>
          </div>
        </header>

        <div class="arena-wrap">
          <canvas id="gameCanvas" width="960" height="672"></canvas>
          <div id="overlay" class="overlay is-hidden" role="status" aria-live="assertive">
            <p id="overlayKicker" class="eyebrow">Paused</p>
            <h2 id="overlayTitle">Game paused</h2>
            <p id="overlayText">Press resume when you are ready.</p>
            <button id="overlayButton" class="primary-button" type="button">Resume</button>
          </div>
        </div>

        <div id="mobileControls" class="mobile-controls is-hidden" aria-label="Mobile controls">
          <button class="mobile-control" type="button" data-dir="up" aria-label="Move up">
            <span aria-hidden="true">&#8593;</span>
          </button>
          <button class="mobile-control" type="button" data-dir="left" aria-label="Move left">
            <span aria-hidden="true">&#8592;</span>
          </button>
          <button class="mobile-control" type="button" data-dir="down" aria-label="Move down">
            <span aria-hidden="true">&#8595;</span>
          </button>
          <button class="mobile-control" type="button" data-dir="right" aria-label="Move right">
            <span aria-hidden="true">&#8594;</span>
          </button>
        </div>
      </section>
    </main>

    <script src="src/boot.js"></script>
  </body>
</html>
